site_name: dcrpy
site_description: Doppler Cloud Radar processing and analysis
repo_url: https://github.com/juanpallotta/dcrpy
repo_name: juanpallotta/dcrpy
theme:
  name: material
nav:
  - Home: index.md
  - API:
      - Overview: api/index.md
      - Single Frequency: api/rpg_binary.md
      - Dual Frequency: api/dual_rpg.md
      - Retrievals: api/retrieve.md
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: numpy
            show_root_heading: true
            show_source: false
markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
